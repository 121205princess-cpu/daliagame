<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>눈알 괴물 퇴치 게임</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        #game-screen { width: 800px; height: 600px; border: 2px solid #555; margin: 50px auto; position: relative; background: #000; }
        .glitch { animation: glitch 0.5s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>
    <h1>왕국 방어전</h1>
    <div id="game-screen">
        <p id="display">왕국에 오신 것을 환영합니다.<br><button onclick="startGame()">왕국 입장하기</button></p>
    </div>

    <script>
        let wave = 0;
        const display = document.getElementById('display');
        const screen = document.getElementById('game-screen');

        function startGame() {
            display.innerHTML = "애니메이션 재생 중...<br>(눈알 괴물들이 몰려온다!)";
            setTimeout(() => {
                display.innerHTML = "요정: 도움을 줄게! 튜토리얼을 시작해.<br><button onclick='runWave(1)'>스토리 시작하기</button>";
            }, 2000);
        }

        async function runWave(w) {
            wave = w;
            screen.classList.add('glitch');
            display.innerHTML = `<h3>웨이브 ${w} 시작!</h3><p>눈알 괴물들을 처치하세요!</p>`;
            
            // 전투 시뮬레이션
            setTimeout(() => {
                display.innerHTML = `<div>⚔️ 공격! 핑크색 반짝이 파티클 발생!</div>` +
                                    `<div>데미지: ${Math.floor(Math.random() * 50) + 50}</div>` +
                                    `<button onclick='runWave(${w + 1})'>다음 웨이브로</button>`;
            }, 3000);
        }
    </script>
</body>
</html>
