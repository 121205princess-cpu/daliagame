<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>냐미의 역습</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Malgun Gothic'; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #dialogue { position: absolute; bottom: 50px; left: 10%; width: 80%; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #ff69b4; display: none; pointer-events: auto; }
        .btn { pointer-events: auto; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; cursor: pointer; background: #ff69b4; border: none; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="title" style="text-align:center; margin-top:50px;">냐미의 역습</h1>
        <div id="dialogue">요정: <span id="text">...</span></div>
        <button class="btn" onclick="startFullGame()">왕국 입장하기</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let gameState = 'IDLE'; // IDLE, CUTSCENE, PLAYING, WAVE_CLEAR
        let wave = 1;

        // 1. 컷씬 애니메이션 시작
        function startFullGame() {
            document.querySelector('.btn').style.display = 'none';
            gameState = 'CUTSCENE';
            // 여기서 카메라가 궁전(임시박스)을 훑는 애니메이션 로직
            showDialogue("냐미... 일어나세요. 눈알 괴물들이 왕국을 포위했습니다.", () => {
                showDialogue("조수 요정: 제 지시를 따르세요. 1 웨이브를 시작합니다!", () => {
                    startWave(1);
                });
            });
        }

        // 2. 웨이브 시스템
        function startWave(w) {
            gameState = 'PLAYING';
            console.log("웨이브 시작: " + w);
            // 여기에 괴물 모델 생성 로직 추가 (현재는 임시 도형)
            spawnEnemies(w * 5); 
        }

        function spawnEnemies(count) {
            for(let i=0; i<count; i++) {
                const mon = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0x00ff00}));
                mon.position.set((Math.random()-0.5)*20, 0, (Math.random()-0.5)*20);
                scene.add(mon);
            }
        }

        function showDialogue(msg, callback) {
            const box = document.getElementById('dialogue');
            box.style.display = 'block';
            document.getElementById('text').innerText = msg;
            box.onclick = () => {
                box.style.display = 'none';
                if(callback) callback();
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
