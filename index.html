<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>냐미의 역습</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Malgun Gothic'; color: white; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #dialogue { position: absolute; bottom: 50px; left: 10%; width: 80%; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #ff69b4; display: none; pointer-events: auto; }
        .btn { pointer-events: auto; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 20px 40px; cursor: pointer; background: #ff69b4; border: none; color: white; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="title" style="text-align:center; margin-top:50px;">냐미의 역습</h1>
        <div id="dialogue">요정: <span id="text">...</span></div>
        <button class="btn" onclick="startFullGame()">왕국 입장하기</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. 임시 모델 (박스와 공) 생성
        const castle = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshNormalMaterial());
        scene.add(castle);

        const nyami = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshBasicMaterial({color: 0xff69b4}));
        nyami.position.set(0, 5, 0);
        scene.add(nyami);

        let enemies = [];
        camera.position.set(0, 10, 40);

        // 2. 컷씬 및 웨이브 로직
        const introBGM = new Audio('assets/music_intro.mp3');
        const battleBGM = new Audio('assets/music_battle.mp3');

        function startFullGame() {
            document.querySelector('.btn').style.display = 'none';
            introBGM.play();
            showDialogue("요정: 냐미... 일어나세요. 눈알 괴물들이 왕국을 포위했습니다.", () => {
                showDialogue("요정: 왕국을 지켜야 합니다. 지금부터 전투를 시작합니다!", () => {
                    introBGM.pause();
                    battleBGM.loop = true;
                    battleBGM.play();
                    spawnEnemies(5); // 1 웨이브 시작
                });
            });
        }

        function spawnEnemies(count) {
            for(let i=0; i<count; i++) {
                const mon = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0x00ff00}));
                mon.position.set((Math.random()-0.5)*30, 0, (Math.random()-0.5)*30);
                scene.add(mon);
                enemies.push(mon);
            }
        }

        function showDialogue(msg, callback) {
            const box = document.getElementById('dialogue');
            box.style.display = 'block';
            document.getElementById('text').innerText = msg;
            box.onclick = () => { box.style.display = 'none'; if(callback) callback(); };
        }

        function animate() {
            requestAnimationFrame(animate);
            // 냐미가 살짝 회전하는 애니메이션
            nyami.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
