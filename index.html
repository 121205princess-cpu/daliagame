<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Eye Monster Kingdom</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
<script>
class GameEngine extends Phaser.Scene {
    constructor() { super('GameScene'); }
    
    preload() {
        this.load.audio('intro', 'music_intro.mp3');
        this.load.audio('battle', 'music_battle.mp3');
    }

    create() {
        this.state = { wave: 0, weapon: '칼' };
        this.add.text(400, 300, '왕국 입장하기', { fontSize: '32px', color: '#fff' })
            .setOrigin(0.5).setInteractive().on('pointerdown', () => this.startWave());
    }

    startWave() {
        this.state.wave++;
        // 음악 전환
        if(this.state.wave === 1) {
            // 여기에 실제 오디오 파일이 있으면 재생됩니다.
        }

        // 조잡한 보스 생성 (마지막 웨이브)
        if(this.state.wave === 3) {
            this.boss = this.add.container(400, 100);
            this.boss.add(this.add.circle(0, 0, 50, 0x800080)); // 눈알 몸체
            this.boss.add(this.add.circle(0, -10, 20, 0xffffff)); // 눈동자
            this.add.text(400, 50, "기괴한 괴물", { color: '#ff0000' }).setOrigin(0.5);
        }
    }

    update() {
        // 화면 불안정 효과
        if(this.state.wave > 0) {
            this.cameras.main.shake(10, this.state.wave * 0.005);
        }
    }
}

const config = {
    type: Phaser.AUTO, width: 800, height: 600,
    scene: GameEngine,
    physics: { default: 'arcade' }
};
new Phaser.Game(config);
</script>
</body>
</html>
